{% if data['RelRep-status'] == 'awaiting-review' %}
<div class="govuk-tag govuk-tag--grey">Awaiting review</div>
{% elseif data['RelRep-status'] == 'withdrawn' %}
<div class="govuk-tag govuk-tag--orange">Withdrawn</div>
{% elseif data['RelRep-status'] == 'invalid' %}
<div class="govuk-tag govuk-tag--red">Invalid</div>
{% elseif data['RelRep-status'] == 'referred' %}
<div class="govuk-tag govuk-tag--blue">Referred</div>
{% else %}
<div class="govuk-tag govuk-tag--green">Valid</div>
{% endif %}
